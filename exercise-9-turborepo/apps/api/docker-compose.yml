# Docker Compose for Turborepo API Database

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: turborepo-todos-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: turborepo_todos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: turborepo_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - turborepo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turborepo_todos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  turborepo_postgres_data:
    driver: local